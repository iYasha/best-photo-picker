# Workspace root for the Best Photo Picker monorepo (not a package itself).
# It groups the members below into one uv environment + one lockfile (uv.lock at this root),
# so `uv run bestphoto …` works from here. See docs/adr/0007.
#
#   core/   — the Python engine + CLI (package `best-photo-picker`)
#   macos/  — the SwiftUI app (NOT a uv member; built with Xcode). See docs/adr/0005.
#
# Run the CLI:   uv run bestphoto score <photos> ...
# Run tests:     uv run --directory core pytest        (pytest config lives in core/)

[tool.uv.workspace]
members = ["core"]
